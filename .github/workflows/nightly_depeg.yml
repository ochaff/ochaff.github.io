name: Depeg Monitor Update

on:
  # The data repository should send this event after publishing a release.
  repository_dispatch:
    types: [data-release]
  workflow_dispatch:
    inputs:
      skip_data_update:
        description: 'Skip the data download step (use existing data)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Dataset construction is memory-intensive and can exceed one hour.
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install \
            pandas \
            numpy \
            scipy \
            scikit-learn \
            shap \
            pyarrow \
            requests

      - name: Download latest on-chain data
        if: ${{ github.event.inputs.skip_data_update != 'true' }}
        run: bash update_data.sh

      # train_rf.py builds the exact dataset it trains on, so avoid duplicate
      # alpha=0.1 dataset construction.
      - name: Train Random Forest and generate dashboard data
        env:
          OMP_NUM_THREADS: 2
          OPENBLAS_NUM_THREADS: 2
          MKL_NUM_THREADS: 2
          NUMEXPR_NUM_THREADS: 2
          PYTHONUNBUFFERED: '1'
        run: |
          mkdir -p dashboard_data
          python -u train_rf.py

      - name: Commit and push dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data/rf_results.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update depeg dashboard [skip ci]"
            git push
          fi
