---
title: Depeg Monitor
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>USDC/USDT Depeg Monitor — Owen Chaffard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    /* ── Design tokens ──────────────────────────────────────────────────────── */
    :root {
      color-scheme: light;
      --surface-0:    #f5f5f4;
      --surface-1:    #fcfcfb;
      --surface-2:    #ebebea;
      --border:       #d6d5d2;
      --text-primary: #0b0b0b;
      --text-secondary:#52514e;
      --text-muted:   #8a8880;

      --blue:    #2a78d6;
      --green:   #1baf7a;
      --amber:   #eda100;
      --red:     #e34948;

      --status-low:  #1baf7a;
      --status-mid:  #eda100;
      --status-high: #e34948;

      --shap-pos: #e34948;
      --shap-neg: #2a78d6;

      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 1px var(--border);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --surface-0:    #111110;
        --surface-1:    #1a1a19;
        --surface-2:    #252524;
        --border:       #383836;
        --text-primary: #ffffff;
        --text-secondary:#c3c2b7;
        --text-muted:   #7a7975;
        --blue:    #3987e5;
        --green:   #199e70;
        --amber:   #c98500;
        --red:     #e66767;
        --status-low:  #199e70;
        --status-mid:  #c98500;
        --status-high: #e66767;
        --shap-pos: #e66767;
        --shap-neg: #3987e5;
        --shadow: 0 1px 3px rgba(0,0,0,.3), 0 0 0 1px var(--border);
      }
    }

    /* ── Reset / base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Site nav ──────────────────────────────────────────────────────────── */
    .site-header {
      background: var(--surface-1);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .site-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }
    .site-title { font-weight: 600; font-size: .95rem; color: var(--text-primary); text-decoration: none; }
    .site-nav a {
      color: var(--text-secondary);
      font-size: .875rem;
      text-decoration: none;
      margin-left: 20px;
    }
    .site-nav a:hover { color: var(--text-primary); }

    /* ── Page layout ──────────────────────────────────────────────────────── */
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px; }
    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 1.5rem; font-weight: 700; }
    .page-subtitle { color: var(--text-secondary); font-size: .9rem; margin-top: 4px; }
    #last-updated { color: var(--text-muted); font-size: .82rem; margin-top: 6px; }

    /* ── Cards ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface-1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 22px;
    }
    .card-title {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    /* ── Top row ──────────────────────────────────────────────────────────── */
    .top-row {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 700px) {
      .top-row { grid-template-columns: 1fr; }
    }

    /* ── Probability gauge ────────────────────────────────────────────────── */
    .gauge-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
    }
    .gauge-wrap { position: relative; width: 180px; height: 110px; }
    .gauge-label {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .gauge-pct {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.02em;
    }
    .gauge-caption {
      font-size: .78rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .gauge-band {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
    }
    .band-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── Stat tiles ───────────────────────────────────────────────────────── */
    .tiles-card { padding: 16px 20px; }
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .tile {
      background: var(--surface-2);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .tile-label {
      font-size: .72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }
    .tile-value {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.1;
    }

    /* ── History chart ────────────────────────────────────────────────────── */
    .history-card { margin-bottom: 16px; }
    .history-card canvas { max-height: 180px; }

    /* ── SHAP row ─────────────────────────────────────────────────────────── */
    .shap-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 700px) {
      .shap-row { grid-template-columns: 1fr; }
    }

    /* ── Legend row ───────────────────────────────────────────────────────── */
    .legend-row {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: .78rem;
      color: var(--text-secondary);
    }
    .legend-swatch {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 2px;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── AUC badge ────────────────────────────────────────────────────────── */
    .auc-badge {
      display: inline-block;
      background: var(--surface-2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: .75rem;
      color: var(--text-secondary);
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Loading / error ──────────────────────────────────────────────────── */
    .loading-msg {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-secondary);
    }
    .error-msg {
      background: #fff0f0;
      border: 1px solid #f9c7c7;
      border-radius: 8px;
      padding: 16px 20px;
      color: #b91c1c;
      font-size: .9rem;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-title" href="/">Owen Chaffard</a>
    <nav class="site-nav">
      <a href="/">Blog</a>
      <a href="/depeg-monitor.html">Depeg Monitor</a>
    </nav>
  </div>
</header>

<main class="page" id="app">
  <div class="loading-msg">Loading dashboard…</div>
</main>

<script>
/* ── Palette helpers ─────────────────────────────────────────────────────── */
function css(prop) {
  return getComputedStyle(document.documentElement).getPropertyValue(prop).trim();
}
function probColor(p) {
  if (p < 0.25) return css('--status-low');
  if (p < 0.55) return css('--status-mid');
  return css('--status-high');
}
function probBand(p) {
  if (p < 0.25) return { text: 'Low risk',  bg: '#e7f9f2', key: 'low' };
  if (p < 0.55) return { text: 'Elevated',  bg: '#fff8e6', key: 'mid' };
  return             { text: 'High risk', bg: '#fef0f0', key: 'high' };
}

/* ── SVG arc gauge ───────────────────────────────────────────────────────── */
function gaugeSVG(prob, color) {
  const cx = 90, cy = 100, r = 72;
  function pt(a) { return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }
  const s = pt(Math.PI), e = pt(2 * Math.PI), p = pt(Math.PI + prob * Math.PI);
  const track = `M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${e.x} ${e.y}`;
  const arc   = `M ${s.x} ${s.y} A ${r} ${r} 0 ${prob > 0.5 ? 1 : 0} 1 ${p.x} ${p.y}`;
  return `<svg viewBox="0 0 180 110" width="180" height="110">
    <path d="${track}" fill="none" stroke="${css('--surface-2')}" stroke-width="14" stroke-linecap="round"/>
    <path d="${arc}"   fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"/>
  </svg>`;
}

/* ── Tile formatting ─────────────────────────────────────────────────────── */
const TILE_LABELS = {
  w_USDC: 'Curve USDC wt.',  w_USDT: 'Curve USDT wt.',  w_DAI: 'Curve DAI wt.',
  curve_entropy: 'Pool entropy',
  'Gegenbauer_0.4_deg1': 'Liq. asymmetry (deg 1)',
  'Gegenbauer_0.4_deg2': 'Liq. shape (deg 2)',
  hhi_24h_rolling_mean: 'LP ownership HHI',
  tick_width_24h_rolling_median: 'Tick width',
  utilisation_rate_usdt: 'AAVE USDT util.',
  utilisation_rate_usdc: 'AAVE USDC util.',
  fear_greed_index: 'Fear & greed',
  depeg_bps: 'Current depeg',
};
const TILE_ORDER = [
  'depeg_bps','w_USDC','w_USDT','w_DAI','curve_entropy',
  'Gegenbauer_0.4_deg1','hhi_24h_rolling_mean',
  'tick_width_24h_rolling_median','utilisation_rate_usdt',
  'utilisation_rate_usdc','fear_greed_index',
];
function fmtVal(k, v) {
  if (v === null || v === undefined) return '—';
  if (k.startsWith('w_') || k.includes('utilisation')) return (v*100).toFixed(1)+'%';
  if (k === 'depeg_bps') return v.toFixed(2)+' bps';
  if (k === 'curve_entropy') return v.toFixed(3);
  if (k.includes('hhi')) return v.toFixed(3);
  if (k.includes('tick_width')) return v.toFixed(0)+' ticks';
  if (k.includes('fear_greed')) return Math.round(v)+'/100';
  if (k.includes('Gegenbauer')) return v.toFixed(4);
  return v.toFixed(3);
}

/* ── Chart builders ──────────────────────────────────────────────────────── */
function historyChart(id, history) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(d => {
        const dt = new Date(d.timestamp);
        return dt.toLocaleDateString('en-GB', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      }),
      datasets: [{
        data: history.map(d => d.depeg_bps),
        borderColor: css('--blue'),
        backgroundColor: css('--blue') + '22',
        borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
        fill: true, tension: 0.3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: css('--surface-1'), titleColor: css('--text-secondary'),
          bodyColor: css('--text-primary'), borderColor: css('--border'), borderWidth: 1,
          callbacks: { label: c => (c.parsed.y != null ? c.parsed.y.toFixed(3) : '—') + ' bps' }
        }
      },
      scales: {
        x: { ticks: { color: css('--text-muted'), maxTicksLimit: 8, font:{size:11} }, grid: { color: css('--border')+'55' } },
        y: { ticks: { color: css('--text-muted'), font:{size:11} }, grid: { color: css('--border')+'55' },
             title: { display:true, text:'bps', color:css('--text-muted'), font:{size:11} } }
      }
    }
  });
}

function shapChart(id, items, colorFn) {
  const labels = items.map(d => d.display_name || d.feature).reverse();
  const values = items.map(d => d.shap_value !== undefined ? d.shap_value : d.importance).reverse();
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: values.map(colorFn),
        borderRadius: 4, borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: css('--surface-1'), titleColor: css('--text-secondary'),
          bodyColor: css('--text-primary'), borderColor: css('--border'), borderWidth: 1,
          callbacks: { label: c => c.parsed.x.toFixed(4) }
        }
      },
      scales: {
        x: { ticks: { color: css('--text-muted'), font:{size:11} }, grid: { color: css('--border')+'55' } },
        y: { ticks: { color: css('--text-primary'), font:{size:11} }, grid: { display:false } }
      }
    }
  });
}

/* ── Main render ─────────────────────────────────────────────────────────── */
async function render() {
  const app = document.getElementById('app');
  let data;
  try {
    const r = await fetch('dashboard_data/rf_results.json?v=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch(e) {
    app.innerHTML = `<div class="error-msg">
      <strong>Dashboard data not available.</strong><br>
      Run <code>python train_rf.py</code> to generate <code>dashboard_data/rf_results.json</code>.<br>
      Error: ${e.message}
    </div>`;
    return;
  }

  const prob  = data.probability;
  const color = probColor(prob);
  const band  = probBand(prob);
  const ts    = data.timestamp
    ? new Date(data.timestamp).toLocaleString('en-GB', {
        year:'numeric', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit', timeZoneName:'short'
      })
    : '—';
  const aucBadge = data.auc != null
    ? `<span class="auc-badge">AUC ${data.auc.toFixed(3)}</span>` : '';

  const nv = data.notable_values || {};
  const tilesHtml = TILE_ORDER
    .filter(k => nv[k] !== undefined)
    .map(k => `<div class="tile">
      <div class="tile-label">${TILE_LABELS[k] || k}</div>
      <div class="tile-value">${fmtVal(k, nv[k])}</div>
    </div>`).join('');

  const nLocal  = Math.min(20, (data.local_shap  || []).length);
  const nGlobal = Math.min(20, (data.global_shap || []).length);

  app.innerHTML = `
    <div class="page-header">
      <div class="page-title">USDC/USDT Depeg Monitor ${aucBadge}</div>
      <div class="page-subtitle">Random forest model · 24-hour depeg probability · SHAP explanations</div>
      <div id="last-updated">Data as of ${ts}</div>
    </div>

    <div class="top-row">
      <div class="card gauge-card">
        <div class="card-title">24h Depeg Probability</div>
        <div class="gauge-wrap">
          ${gaugeSVG(prob, color)}
          <div class="gauge-label">
            <div class="gauge-pct" style="color:${color}">${(prob*100).toFixed(1)}%</div>
            <div class="gauge-caption">next 24 h</div>
          </div>
        </div>
        <div class="gauge-band" style="background:${band.bg}; color:${color}">
          <span class="band-dot" style="background:${color}"></span>
          ${band.text}
        </div>
      </div>

      <div class="card tiles-card">
        <div class="card-title">Current Market Metrics</div>
        <div class="tiles-grid">${tilesHtml}</div>
      </div>
    </div>

    <div class="card history-card">
      <div class="card-title">Depeg history — last 7 days (bps)</div>
      <canvas id="history-chart"></canvas>
    </div>

    <div class="shap-row" style="margin-top:16px">
      <div class="card">
        <div class="card-title">Local SHAP — this observation</div>
        <div style="height:${nLocal * 26 + 40}px">
          <canvas id="local-shap-chart"></canvas>
        </div>
        <div class="legend-row">
          <span><span class="legend-swatch" style="background:${css('--shap-pos')}"></span>Increases probability</span>
          <span><span class="legend-swatch" style="background:${css('--shap-neg')}"></span>Decreases probability</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Global SHAP — mean |SHAP| over test set</div>
        <div style="height:${nGlobal * 26 + 40}px">
          <canvas id="global-shap-chart"></canvas>
        </div>
      </div>
    </div>
  `;

  if (data.depeg_history?.length) {
    historyChart('history-chart', data.depeg_history);
  }
  if (data.local_shap?.length) {
    shapChart('local-shap-chart', data.local_shap, v => v >= 0 ? css('--shap-pos') : css('--shap-neg'));
  }
  if (data.global_shap?.length) {
    shapChart('global-shap-chart', data.global_shap, () => css('--blue'));
  }
}

render();
</script>
</body>
</html>
